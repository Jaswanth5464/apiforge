version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./postman_clone.db
      # For Postgres use:
      # - DATABASE_URL=postgresql://user:password@db:5432/dbname
    volumes:
      - api-data:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Ensure frontend connects to backend on the client via browser, so this needs to be accessible from host
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  api-data:
